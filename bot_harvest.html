<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT Harvest</title>
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; font-size: 14px; }
h2 { color: #93c5fd; margin: 0 0 16px; }
button { background: #1e40af; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin: 4px; }
button:active { background: #1d4ed8; }
button.gray { background: #334155; }
pre { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 12px; color: #94a3b8; min-height: 60px; margin-top: 10px; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.section { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
#status { font-size: 13px; color: #fbbf24; margin: 8px 0; min-height: 20px; }
</style>
</head>
<body>

<h2>🌾 BOT Harvest</h2>

<div class="section">
  <div><strong>Worker:</strong> <span id="wurl" style="font-size:12px;color:#93c5fd"></span></div>
  <div id="status">กด Ping เพื่อทดสอบ connection</div>
  <button onclick="ping()">Ping Worker</button>
</div>

<div class="section">
  <strong>Harvest ข้อมูล</strong>
  <div style="margin: 10px 0">
    <button onclick="runHarvest()">▶ Run Harvest</button>
    <button class="gray" onclick="getLatest()">↻ Load Latest</button>
  </div>
  <pre id="out1">กด Run Harvest เพื่อดึงข้อมูลจาก BOT API</pre>
</div>

<div class="section">
  <strong>ทดสอบ APIs แยก</strong>
  <div style="margin: 10px 0">
    <button onclick="testRates()">🏦 Test Rates</button>
    <button onclick="testFX('USD')">💵 Test USD</button>
    <button onclick="testFX('EUR')">💶 Test EUR</button>
  </div>
  <pre id="out2">กดปุ่มด้านบนเพื่อทดสอบ</pre>
</div>

<script>
var W = 'https://iaa-ingest.9vk92zm5z2.workers.dev';
var T = '09b9d0a2-4091-4173-873c-3c46860a5fe1';

document.getElementById('wurl').textContent = W;

function h() {
  return { 'Authorization': 'Bearer ' + T, 'Content-Type': 'application/json' };
}

function show(id, text, isErr) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = isErr ? 'err' : '';
}

function status(msg) {
  document.getElementById('status').textContent = msg;
}

async function ping() {
  status('กำลัง ping...');
  try {
    var t = Date.now();
    var r = await fetch(W + '/bot/status', { headers: h(), signal: AbortSignal.timeout(8000) });
    var d = await r.json();
    status('HTTP ' + r.status + ' — ' + (Date.now()-t) + 'ms');
    show('out1', JSON.stringify(d, null, 2));
  } catch(e) {
    status('❌ ' + e.message);
    show('out1', e.message, true);
  }
}

async function runHarvest() {
  status('⏳ กำลัง harvest...');
  show('out1', 'กำลังส่ง POST /bot/harvest/run ...');
  try {
    var r = await fetch(W + '/bot/harvest/run', {
      method: 'POST',
      headers: h(),
      signal: AbortSignal.timeout(60000)
    });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok ? ' ✅' : ' ❌'));
    try {
      show('out1', JSON.stringify(JSON.parse(text), null, 2), !r.ok);
    } catch(e) {
      show('out1', text, !r.ok);
    }
  } catch(e) {
    status('❌ ' + e.message);
    show('out1', 'Error: ' + e.message, true);
  }
}

async function getLatest() {
  status('⏳ กำลังโหลด...');
  try {
    var r = await fetch(W + '/bot/harvest/latest', { headers: h(), signal: AbortSignal.timeout(10000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok ? ' ✅' : ' ❌'));
    try {
      show('out1', JSON.stringify(JSON.parse(text), null, 2), !r.ok);
    } catch(e) {
      show('out1', text, !r.ok);
    }
  } catch(e) {
    status('❌ ' + e.message);
    show('out1', 'Error: ' + e.message, true);
  }
}

async function testRates() {
  status('⏳ กำลังทดสอบ Rates...');
  show('out2', 'กำลังส่ง GET /bot/harvest/test/rates ...');
  try {
    var r = await fetch(W + '/bot/harvest/test/rates', { headers: h(), signal: AbortSignal.timeout(30000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok ? ' ✅' : ' ❌'));
    try {
      show('out2', JSON.stringify(JSON.parse(text), null, 2), !r.ok);
    } catch(e) {
      show('out2', text, !r.ok);
    }
  } catch(e) {
    status('❌ ' + e.message);
    show('out2', 'Error: ' + e.message, true);
  }
}

async function testFX(currency) {
  status('⏳ กำลังทดสอบ FX ' + currency + '...');
  show('out2', 'กำลังส่ง GET /bot/harvest/test/fx?currency=' + currency + ' ...');
  try {
    var r = await fetch(W + '/bot/harvest/test/fx?currency=' + currency, { headers: h(), signal: AbortSignal.timeout(20000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok ? ' ✅' : ' ❌'));
    try {
      show('out2', JSON.stringify(JSON.parse(text), null, 2), !r.ok);
    } catch(e) {
      show('out2', text, !r.ok);
    }
  } catch(e) {
    status('❌ ' + e.message);
    show('out2', 'Error: ' + e.message, true);
  }
}
</script>
</body>
</html>

<script>
// เพิ่มปุ่มทดสอบ APIs ที่ยังไม่รู้ fields
document.addEventListener('DOMContentLoaded', function() {
  var sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <strong>🔬 Scan Fields — APIs ที่ยังไม่รู้ structure</strong>
    <div style="margin: 10px 0; display:flex; flex-wrap:wrap; gap:6px">
      <button onclick="scanAPI('bibor_rate','GET','https://gateway.api.bot.or.th/BIBOR/v2/bibor_rate/?start_period=2026-04-01&end_period=2026-05-13&bank=ALL','rate')">BIBOR per Bank</button>
      <button onclick="scanAPI('ext_ffr','GET','https://gateway.api.bot.or.th/Stat-ExternalInterestRate/v2/EXT_INT_RATE/?start_period=2026-04-01&end_period=2026-05-13&rate_type=FFR','rate')">External Rate FFR</button>
      <button onclick="scanAPI('ext_sofr','GET','https://gateway.api.bot.or.th/Stat-ExternalInterestRate/v2/EXT_INT_RATE/?start_period=2026-04-01&end_period=2026-05-13&rate_type=SOFR','rate')">External Rate SOFR</button>
      <button onclick="scanAPI('thb_impl','GET','https://gateway.api.bot.or.th/Stat-ThaiBahtImpliedInterestRate/v2/THB_IMPL_INT_RATE/?start_period=2026-04-01&end_period=2026-05-13','rate')">THB Implied</button>
      <button onclick="scanAPI('swap_on','GET','https://gateway.api.bot.or.th/Stat-SwapPoint/v2/SWAPPOINT/?start_period=2026-04-01&end_period=2026-05-13&term_type=1W','rate')">Swap Point 1W</button>
      <button onclick="scanAPI('spot','GET','https://gateway.api.bot.or.th/Stat-SpotRate/v2/SPOTRATE/?start_period=2026-04-01&end_period=2026-05-13','rate')">Spot Rate</button>
      <button onclick="scanAPI('interbank_on','GET','https://gateway.api.bot.or.th/Stat-InterbankTransactionRate/v2/INTRBNK_TXN_RATE/?start_period=2026-04-01&end_period=2026-05-13&term_type=O%2FN','rate')">Interbank O/N</button>
      <button onclick="scanAPI('interbank_1w','GET','https://gateway.api.bot.or.th/Stat-InterbankTransactionRate/v2/INTRBNK_TXN_RATE/?start_period=2026-04-01&end_period=2026-05-13&term_type=1W','rate')">Interbank 1W</button>
      <button onclick="scanAPI('deposit_raw','GET','https://gateway.api.bot.or.th/DepositRate/v2/deposit_rate/?start_period=2026-04-01&end_period=2026-05-13','rate')">Deposit Rate (raw)</button>
    </div>
    <pre id="scan-out" style="min-height:80px">กดปุ่มเพื่อดู fields จาก API จริง</pre>
  `;
  document.querySelector('.container').appendChild(sec);
});

async function scanAPI(id, method, url, keyType) {
  var out = document.getElementById('scan-out');
  out.textContent = 'กำลังดึง: ' + url + '\n...';
  // ส่งผ่าน worker proxy เพื่อหลีกเลี่ยง CORS
  var probeUrl = W + '/bot/probe?path=' + encodeURIComponent(url.replace('https://gateway.api.bot.or.th/', ''));
  try {
    var r = await fetch(probeUrl, { headers: h(), signal: AbortSignal.timeout(20000) });
    var text = await r.text();
    try {
      var d = JSON.parse(text);
      // หา data_detail
      var detail = d?.response?.result?.data?.data_detail;
      if (!detail) detail = d?.result?.data?.data_detail;
      if (detail) {
        var arr = Array.isArray(detail) ? detail : Object.values(detail);
        if (arr.length > 0) {
          out.textContent = '✅ Fields ที่พบ:\n' + JSON.stringify(Object.keys(arr[0]), null, 2)
            + '\n\nSample row:\n' + JSON.stringify(arr[0], null, 2)
            + '\n\nTotal rows: ' + arr.length;
        } else {
          out.textContent = '⚠️ data_detail ว่างเปล่า\n\n' + JSON.stringify(d, null, 2).slice(0, 500);
        }
      } else {
        out.textContent = '⚠️ ไม่พบ data_detail\n\n' + JSON.stringify(d, null, 2).slice(0, 800);
      }
    } catch(e) {
      out.textContent = 'Parse error: ' + e.message + '\n\n' + text.slice(0, 500);
    }
  } catch(e) {
    out.textContent = '❌ ' + e.message;
  }
}
</script>

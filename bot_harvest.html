<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT Harvest</title>
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; font-size: 14px; }
h2 { color: #93c5fd; margin: 0 0 16px; }
button { background: #1e40af; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin: 4px; }
button:active { background: #1d4ed8; }
button.gray { background: #334155; }
button.sm { padding: 6px 12px; font-size: 12px; background: #334155; }
button.sm:active { background: #475569; }
pre { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 12px; color: #94a3b8; min-height: 60px; margin-top: 10px; }
.ok { color: #4ade80; }
.err { color: #f87171; }
.section { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.section h3 { color: #93c5fd; font-size: 13px; margin: 0 0 10px; }
#status { font-size: 13px; color: #fbbf24; margin: 8px 0; min-height: 20px; }
.wrap { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; }
</style>
</head>
<body>

<h2>🌾 BOT Harvest</h2>

<div class="section">
  <div><strong>Worker:</strong> <span id="wurl" style="font-size:12px;color:#93c5fd"></span></div>
  <div id="status">กด Ping เพื่อทดสอบ connection</div>
  <button onclick="ping()">Ping Worker</button>
</div>

<div class="section">
  <h3>Harvest ข้อมูล</h3>
  <div class="wrap">
    <button onclick="runHarvest()">▶ Run Harvest</button>
    <button class="gray" onclick="getLatest()">↻ Load Latest</button>
  </div>
  <pre id="out1">กด Run Harvest เพื่อดึงข้อมูลจาก BOT API</pre>
</div>

<div class="section">
  <h3>ทดสอบ APIs แยก</h3>
  <div class="wrap">
    <button onclick="testRates()">🏦 Test Rates</button>
    <button onclick="testFX('USD')">💵 Test USD</button>
    <button onclick="testFX('EUR')">💶 Test EUR</button>
  </div>
  <pre id="out2">กดปุ่มด้านบนเพื่อทดสอบ</pre>
</div>

<div class="section">
  <h3>🔬 Scan Fields — หา field names จาก API จริง</h3>
  <div class="wrap">
    <button class="sm" onclick="scan('spot')">Spot Rate</button>
    <button class="sm" onclick="scan('ext_ffr')">External FFR</button>
    <button class="sm" onclick="scan('ext_sofr')">External SOFR</button>
    <button class="sm" onclick="scan('ext_libor')">External LIBOR</button>
    <button class="sm" onclick="scan('thb_on')">THB Implied O/N</button>
    <button class="sm" onclick="scan('thb_1w')">THB Implied 1W</button>
    <button class="sm" onclick="scan('thb_1m')">THB Implied 1M</button>
    <button class="sm" onclick="scan('swap_1w')">Swap 1W</button>
    <button class="sm" onclick="scan('swap_1m')">Swap 1M</button>
    <button class="sm" onclick="scan('ib_on')">Interbank O/N</button>
    <button class="sm" onclick="scan('ib_1w')">Interbank 1W</button>
    <button class="sm" onclick="scan('bibor_bank')">BIBOR per Bank</button>
    <button class="sm" onclick="scan('deposit_raw')">Deposit Raw</button>
    <button class="sm" onclick="scan('ext_all')">Ext All</button>
    <button class="sm" onclick="scan('thb_all')">THB Impl All</button>
    <button class="sm" onclick="scan('swap_all')">Swap All</button>
  </div>
  <pre id="out3">กดปุ่มเพื่อดู field names และ sample data จาก API จริง</pre>
</div>

<script>
var W = 'https://iaa-ingest.9vk92zm5z2.workers.dev';
var T = '09b9d0a2-4091-4173-873c-3c46860a5fe1';
document.getElementById('wurl').textContent = W;

function h() { return { 'Authorization': 'Bearer ' + T, 'Content-Type': 'application/json' }; }
function show(id, text, isErr) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = isErr ? 'err' : '';
}
function status(msg) { document.getElementById('status').textContent = msg; }

async function ping() {
  status('กำลัง ping...');
  try {
    var t = Date.now();
    var r = await fetch(W + '/bot/status', { headers: h(), signal: AbortSignal.timeout(8000) });
    status('HTTP ' + r.status + ' — ' + (Date.now()-t) + 'ms ' + (r.ok?'✅':'❌'));
  } catch(e) { status('❌ ' + e.message); }
}

async function runHarvest() {
  status('⏳ กำลัง harvest...');
  show('out1', 'กำลังส่ง POST /bot/harvest/run ...');
  try {
    var r = await fetch(W + '/bot/harvest/run', { method:'POST', headers:h(), signal:AbortSignal.timeout(60000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok?' ✅':' ❌'));
    try { show('out1', JSON.stringify(JSON.parse(text), null, 2), !r.ok); }
    catch(e) { show('out1', text, !r.ok); }
  } catch(e) { status('❌ ' + e.message); show('out1', 'Error: '+e.message, true); }
}

async function getLatest() {
  status('⏳ กำลังโหลด...');
  try {
    var r = await fetch(W + '/bot/harvest/latest', { headers:h(), signal:AbortSignal.timeout(10000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok?' ✅':' ❌'));
    try { show('out1', JSON.stringify(JSON.parse(text), null, 2), !r.ok); }
    catch(e) { show('out1', text, !r.ok); }
  } catch(e) { status('❌ ' + e.message); show('out1', 'Error: '+e.message, true); }
}

async function testRates() {
  status('⏳ กำลังทดสอบ...');
  show('out2', 'กำลังส่ง /bot/harvest/test/rates ...');
  try {
    var r = await fetch(W + '/bot/harvest/test/rates', { headers:h(), signal:AbortSignal.timeout(30000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok?' ✅':' ❌'));
    try { show('out2', JSON.stringify(JSON.parse(text), null, 2), !r.ok); }
    catch(e) { show('out2', text, !r.ok); }
  } catch(e) { status('❌ ' + e.message); show('out2', 'Error: '+e.message, true); }
}

async function testFX(currency) {
  status('⏳ กำลังทดสอบ FX ' + currency + '...');
  show('out2', 'กำลังส่ง /bot/harvest/test/fx?currency=' + currency + ' ...');
  try {
    var r = await fetch(W + '/bot/harvest/test/fx?currency=' + currency, { headers:h(), signal:AbortSignal.timeout(20000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok?' ✅':' ❌'));
    try { show('out2', JSON.stringify(JSON.parse(text), null, 2), !r.ok); }
    catch(e) { show('out2', text, !r.ok); }
  } catch(e) { status('❌ ' + e.message); show('out2', 'Error: '+e.message, true); }
}

async function scan(apiKey) {
  status('⏳ Scanning: ' + apiKey + '...');
  show('out3', 'กำลังดึง api=' + apiKey + '...');
  try {
    var r = await fetch(W + '/bot/harvest/test/scan?api=' + apiKey, { headers:h(), signal:AbortSignal.timeout(25000) });
    var text = await r.text();
    status('HTTP ' + r.status + (r.ok?' ✅':' ❌') + ' — ' + apiKey);
    try {
      var d = JSON.parse(text);
      var out = '✅ API: ' + apiKey + '\n';
      out += 'HTTP: ' + d.http_status + ' | rows: ' + d.total_rows + '\n\n';
      out += 'Fields: ' + JSON.stringify(d.fields) + '\n\n';
      if (d.sample && d.sample.length > 0) {
        out += 'Sample row 1:\n' + JSON.stringify(d.sample[0], null, 2);
        if (d.sample.length > 1) out += '\n\nSample row 2:\n' + JSON.stringify(d.sample[1], null, 2);
      } else {
        out += 'No sample data\n\nFull response:\n' + JSON.stringify(d, null, 2);
      }
      show('out3', out, !r.ok);
    } catch(e) {
      show('out3', 'Parse error: ' + e.message + '\n\n' + text.slice(0, 800));
    }
  } catch(e) {
    status('❌ ' + e.message);
    show('out3', '❌ ' + e.message, true);
  }
}
</script>
</body>
</html>

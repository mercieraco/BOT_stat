<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT Explorer — Login</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07080f}
body{font-family:'Courier New',monospace;font-size:13px;color:#c8d0e8;display:flex;align-items:center;justify-content:center;min-height:100vh}

/* bg grid */
body::before{
content:’’;position:fixed;inset:0;
background-image:linear-gradient(rgba(30,40,80,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(30,40,80,.3) 1px,transparent 1px);
background-size:40px 40px;pointer-events:none;z-index:0;
}

.container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}

/* logo */
.logo{text-align:center;margin-bottom:40px}
.logo-icon{
width:56px;height:56px;border-radius:14px;margin:0 auto 14px;
background:linear-gradient(135deg,#1a3a7a,#2563eb);
display:flex;align-items:center;justify-content:center;
font-size:24px;font-weight:700;color:#fff;
box-shadow:0 0 40px rgba(37,99,235,.4);
}
.logo-title{font-size:20px;font-weight:700;color:#93c5fd;letter-spacing:.5px}
.logo-sub{font-size:11px;color:#2a3050;margin-top:4px}

/* card */
.card{
background:#0c0e1c;
border:1px solid #1a1d30;
border-radius:12px;
padding:32px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.card-title{font-size:14px;font-weight:700;color:#93c5fd;margin-bottom:24px;text-align:center}

/* form */
.field{margin-bottom:18px}
.label{display:block;font-size:10px;color:#3a4060;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.inp{
width:100%;background:#080910;border:1px solid #1a1d2e;border-radius:7px;
color:#c8d0e8;font-family:inherit;font-size:13px;padding:11px 14px;
outline:none;transition:border-color .15s;
}
.inp:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.inp::placeholder{color:#2a3050}

/* show/hide password */
.inp-wrap{position:relative}
.inp-wrap .inp{padding-right:44px}
.toggle-pw{
position:absolute;right:12px;top:50%;transform:translateY(-50%);
background:none;border:none;color:#3a4060;cursor:pointer;font-size:16px;
padding:4px;line-height:1;
}
.toggle-pw:hover{color:#93c5fd}

/* submit */
.btn-login{
width:100%;padding:12px;border:none;border-radius:7px;
background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;
font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
transition:opacity .15s,box-shadow .15s;margin-top:6px;
box-shadow:0 4px 20px rgba(37,99,235,.3);
}
.btn-login:hover{opacity:.9;box-shadow:0 6px 28px rgba(37,99,235,.45)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* error */
.error{
background:#1a0808;border:1px solid #401414;border-radius:6px;
padding:10px 14px;color:#f87171;font-size:12px;margin-bottom:16px;
display:none;
}
.error.show{display:block;animation:shake .3s ease}

/* loading spinner */
.spinner{
display:inline-block;width:14px;height:14px;
border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
border-radius:50%;animation:spin .6s linear infinite;
vertical-align:middle;margin-right:6px;
}

/* footer */
.footer{text-align:center;margin-top:20px;font-size:10px;color:#1e2235}

/* remember me */
.remember{display:flex;align-items:center;gap:8px;margin-bottom:20px;cursor:pointer}
.remember input{accent-color:#2563eb;cursor:pointer}
.remember span{font-size:11px;color:#3a4060}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.container{animation:fadein .4s ease}
</style>

</head>
<body>

  <!-- Logo -->

  <div class="logo">
    <div class="logo-icon">B</div>
    <div class="logo-title">BOT API Explorer</div>
    <div class="logo-sub">Bank of Thailand Statistics</div>
  </div>

  <!-- Card -->

  <div class="card">
    <div class="card-title">🔐 เข้าสู่ระบบ</div>

<div class="error" id="error-msg"></div>

<div class="field">
  <label class="label" for="username">Username</label>
  <input class="inp" type="text" id="username" placeholder="ชื่อผู้ใช้" autocomplete="username" autocapitalize="none">
</div>

<div class="field">
  <label class="label" for="password">Password</label>
  <div class="inp-wrap">
    <input class="inp" type="password" id="password" placeholder="รหัสผ่าน" autocomplete="current-password">
    <button class="toggle-pw" type="button" onclick="togglePw()" title="แสดง/ซ่อนรหัสผ่าน" id="eye-btn">👁</button>
  </div>
</div>

<label class="remember">
  <input type="checkbox" id="remember-me">

  <div class="footer">IAA Consensus System · Phase 5b</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const WORKER = 'https://iaa-ingest.9vk92zm5z2.workers.dev';
const TOKEN_KEY   = 'bot_auth_token';
const EXPIRY_KEY  = 'bot_auth_expiry';
const BOT_PAGE    = 'bot_stat.html';

// ── AUTO LOGIN ── ถ้ามี token ที่ยังไม่หมดอายุ ─────────────
(function checkExisting(){
  const token  = localStorage.getItem(TOKEN_KEY);
  const expiry = localStorage.getItem(EXPIRY_KEY);
  if(token && expiry && Date.now() < parseInt(expiry)){
    // verify token ยังใช้ได้ไหม
    fetch(`${WORKER}/auth/verify`,{
      headers:{ Authorization:`Bearer ${token}` },
      signal: AbortSignal.timeout(4000)
    }).then(r=>{
      if(r.ok) window.location.href = BOT_PAGE;
    }).catch(()=>{}); // ถ้า verify ไม่ได้ ปล่อยให้ login ปกติ
  }
})();

// ── ENTER KEY ──────────────────────────────────────────────
document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key==='Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('password').focus();
});

// ── TOGGLE PASSWORD ────────────────────────────────────────
function togglePw(){
  const inp = document.getElementById('password');
  const btn = document.getElementById('eye-btn');
  if(inp.type==='password'){
    inp.type='text'; btn.textContent='🙈';
  } else {
    inp.type='password'; btn.textContent='👁';
  }
}

// ── SHOW ERROR ─────────────────────────────────────────────
function showError(msg){
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth; // reflow for animation
  el.classList.add('show');
}
function hideError(){
  document.getElementById('error-msg').classList.remove('show');
}

// ── LOGIN ──────────────────────────────────────────────────
async function doLogin(){
  hideError();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember-me').checked;
  const btn = document.getElementById('login-btn');

  if(!username){ showError('กรุณากรอก Username'); return; }
  if(!password){ showError('กรุณากรอก Password'); return; }

  // loading state
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังตรวจสอบ...';

  try{
    const res = await fetch(`${WORKER}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      signal: AbortSignal.timeout(8000),
    });

    const data = await res.json().catch(()=>({}));

    if(res.ok && data.token){
      // บันทึก token
      localStorage.setItem(TOKEN_KEY, data.token);
      const days = remember ? 7 : 1;
      localStorage.setItem(EXPIRY_KEY, Date.now() + days * 86400000);
      localStorage.setItem('bot_username', username);
      // redirect
      window.location.href = BOT_PAGE;
    } else {
      const msg = data.error || `HTTP ${res.status}`;
      showError('❌ ' + (res.status===401 ? 'Username หรือ Password ไม่ถูกต้อง' : msg));
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ';
    }
  } catch(err){
    // ถ้า Worker ยังไม่ได้ deploy /auth/login → fallback simple check
    if(err.name==='AbortError' || err.message.includes('fetch')){
      showError('❌ เชื่อมต่อ Worker ไม่ได้ — ตรวจสอบ internet หรือ Worker URL');
    } else {
      showError('❌ ' + err.message);
    }
    btn.disabled = false;
    btn.innerHTML = 'เข้าสู่ระบบ';
  }
}
</script>

<body>
<div id="root"></div>
<script type="module">
import React,{useState,useCallback,useRef} from 'react';
import{createRoot}from'react-dom/client';
const e=React.createElement;

/* ── CONFIG ── แก้ตรงนี้ */
const WORKER=‘https://iaa-ingest.9vk92zm5z2.workers.dev’;

/* ── 10 หมวด BOT ── */
const CATS=[
{id:‘EC’, th:‘เศรษฐกิจ’,              en:‘Economic’},
{id:‘IR’, th:‘อัตราดอกเบี้ย’,          en:‘Interest Rates’},
{id:‘ER’, th:‘อัตราแลกเปลี่ยน’,        en:‘Exchange Rates’},
{id:‘FM’, th:‘ตลาดการเงิน’,            en:‘Financial Market’},
{id:‘FI’, th:‘สถาบันการเงิน’,          en:‘Financial Institutions’},
{id:‘PS’, th:‘ระบบการชำระเงิน’,        en:‘Payment Systems’},
{id:‘BOP’,th:‘ดุลการชำระเงิน’,         en:‘Balance of Payments’},
{id:‘GS’, th:‘ภาคการคลัง’,             en:‘Government Sector’},
{id:‘PF’, th:‘ตราสารหนี้ภาคเอกชน’,    en:‘Private Finance’},
{id:‘DB’, th:‘ผลประมูลตราสารหนี้’,    en:‘Debt Auction’},
];

/* ── MOCK DATA ── */
const MOCK_S={
EC:[
{series_code:‘BORCPI01’,   series_name_th:‘ดัชนีราคาผู้บริโภค CPI’,     series_name_eng:‘Consumer Price Index’,   unit_eng:’%’,     frequency:‘Monthly’,   last_update_date:‘2026-04-30’},
{series_code:‘BORGDP01’,   series_name_th:‘อัตราเติบโต GDP’,             series_name_eng:‘GDP Growth Rate’,         unit_eng:’%’,     frequency:‘Quarterly’, last_update_date:‘2026-03-31’},
{series_code:‘BORPMI01’,   series_name_th:‘ดัชนี PMI ภาคการผลิต’,      series_name_eng:‘Manufacturing PMI’,       unit_eng:‘Index’, frequency:‘Monthly’,   last_update_date:‘2026-04-30’},
{series_code:‘BORTRD01’,   series_name_th:‘มูลค่าการส่งออก’,            series_name_eng:‘Export Value’,            unit_eng:‘M.USD’, frequency:‘Monthly’,   last_update_date:‘2026-03-31’},
{series_code:‘BORIMP01’,   series_name_th:‘มูลค่าการนำเข้า’,            series_name_eng:‘Import Value’,            unit_eng:‘M.USD’, frequency:‘Monthly’,   last_update_date:‘2026-03-31’},
],
IR:[
{series_code:‘IR_1103500_06’,series_name_th:‘อัตราดอกเบี้ยนโยบาย’,    series_name_eng:‘Policy Rate’,     unit_eng:’%’,frequency:‘Monthly’,last_update_date:‘2026-04-30’},
{series_code:‘IR_1103500_13’,series_name_th:‘อัตราดอกเบี้ย MLR’,       series_name_eng:‘MLR Rate’,        unit_eng:’%’,frequency:‘Daily’,  last_update_date:‘2026-05-09’},
{series_code:‘IR_1103500_14’,series_name_th:‘อัตราดอกเบี้ย MRR’,       series_name_eng:‘MRR Rate’,        unit_eng:’%’,frequency:‘Daily’,  last_update_date:‘2026-05-09’},
],
ER:[
{series_code:‘EREF01’,series_name_th:‘USD/THB ถัวเฉลี่ยระหว่างธนาคาร’,series_name_eng:‘USD/THB Interbank’,unit_eng:‘THB/USD’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
{series_code:‘EREF02’,series_name_th:‘EUR/THB’,                          series_name_eng:‘EUR/THB Rate’,     unit_eng:‘THB/EUR’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
{series_code:‘EREF03’,series_name_th:‘JPY/THB’,                          series_name_eng:‘JPY/THB Rate’,     unit_eng:‘THB/JPY’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
],
};
for(const c of CATS)if(!MOCK_S[c.id])MOCK_S[c.id]=[];

const MOCK_OBS={
BORCPI01:     [{p:‘2026-04’,v:‘1.12’},{p:‘2026-03’,v:‘0.78’},{p:‘2026-02’,v:‘0.55’},{p:‘2026-01’,v:‘0.35’},{p:‘2025-12’,v:‘0.65’},{p:‘2025-11’,v:‘0.72’},{p:‘2025-10’,v:‘0.89’},{p:‘2025-09’,v:‘0.91’}],
IR_1103500_06:[{p:‘2026-04’,v:‘2.50’},{p:‘2026-03’,v:‘2.50’},{p:‘2026-02’,v:‘2.50’},{p:‘2026-01’,v:‘2.50’},{p:‘2025-12’,v:‘2.25’},{p:‘2025-11’,v:‘2.25’}],
EREF01:       [{p:‘2026-04’,v:‘33.2’},{p:‘2026-03’,v:‘33.5’},{p:‘2026-02’,v:‘33.8’},{p:‘2026-01’,v:‘34.1’},{p:‘2025-12’,v:‘33.9’},{p:‘2025-11’,v:‘33.6’}],
};
function mockObs(code){
if(MOCK_OBS[code])return MOCK_OBS[code];
return Array.from({length:10},(_,i)=>{
const d=new Date(2026,3-i,1);
return{p:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,v:(Math.random()*3+1).toFixed(2)};
});
}

/* ── SPARKLINE ── */
function Spark({obs}){
const vals=obs.map(o=>parseFloat(o.v??o.value)).filter(v=>!isNaN(v));
if(vals.length<2)return null;
const W=260,H=50,p=5,mn=Math.min(…vals),mx=Math.max(…vals),rng=mx-mn||.01;
const pts=vals.map((v,i)=>[p+(i/(vals.length-1))*(W-p*2), H-p-((v-mn)/rng)*(H-p*2)]);
const up=vals[vals.length-1]>=vals[vals.length-2];
const col=up?’#34d399’:’#f87171’;
const ps=pts.map(([x,y])=>`${x},${y}`).join(’ ‘);
const area=`${pts[0][0]},${H} ${ps} ${pts[pts.length-1][0]},${H}`;
return e(‘div’,{style:{marginTop:10}},
e(‘svg’,{width:W,height:H,style:{display:‘block’,overflow:‘visible’}},
e(‘defs’,null,e(‘linearGradient’,{id:‘sg’,x1:‘0’,y1:‘0’,x2:‘0’,y2:‘1’},
e(‘stop’,{offset:‘0%’,stopColor:col,stopOpacity:’.28’}),
e(‘stop’,{offset:‘100%’,stopColor:col,stopOpacity:‘0’})
)),
e(‘polygon’,{points:area,fill:‘url(#sg)’}),
e(‘polyline’,{points:ps,fill:‘none’,stroke:col,strokeWidth:‘1.8’,strokeLinejoin:‘round’,strokeLinecap:‘round’}),
e(‘circle’,{cx:pts[pts.length-1][0],cy:pts[pts.length-1][1],r:‘3’,fill:col})
),
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,fontSize:9,color:’#2a3050’,marginTop:3}},
e(‘span’,null,obs[0]?.p??obs[0]?.period_start??’’),
e(‘span’,{style:{color:col,fontWeight:700}},vals[vals.length-1]),
e(‘span’,null,obs[obs.length-1]?.p??obs[obs.length-1]?.period_start??’’)
)
);
}

/* ── UI ATOMS ── */
function Tag({children,c=‘gray’}){
const m={blue:[’#0a1428’,’#60a5fa’],green:[’#0a2018’,’#34d399’],orange:[’#1e1200’,’#fb923c’],gray:[’#12141f’,’#4a5070’]};
const[bg,fg]=m[c]||m.gray;
return e(‘span’,{style:{display:‘inline-block’,padding:‘1px 7px’,borderRadius:3,fontSize:9,fontWeight:700,background:bg,color:fg}},children);
}
function Btn({children,onClick,v=‘def’,sm,disabled}){
const m={pri:[’#1d4ed8’,’#fff’,’#2563eb’],ok:[’#0a2018’,’#34d399’,’#14402e’],red:[’#220a0a’,’#f87171’,’#401414’],def:[’#12141f’,’#6b7280’,’#1e2235’]};
const[bg,fg,bd]=m[v]||m.def;
return e(‘button’,{onClick,disabled,style:{background:bg,color:fg,border:`1px solid ${bd}`,borderRadius:5,padding:sm?‘3px 8px’:‘6px 13px’,fontSize:sm?10:12,fontWeight:600,cursor:disabled?‘not-allowed’:‘pointer’,opacity:disabled?.5:1}},children);
}
function Inp({value,onChange,placeholder,type=‘text’,full}){
return e(‘input’,{value,onChange,placeholder,type,style:{background:’#080910’,border:‘1px solid #1a1d2e’,borderRadius:5,color:’#c8d0e8’,fontFamily:‘inherit’,fontSize:12,padding:‘7px 11px’,outline:‘none’,width:full?‘100%’:‘auto’}});
}
function Card({children,style={}}){
return e(‘div’,{style:{background:’#0c0e1c’,border:‘1px solid #161826’,borderRadius:8,padding:16,marginBottom:10,…style}},children);
}
function Dot({ok,ms}){
if(ok===null)return e(‘span’,{style:{color:’#333’,fontSize:11}},‘ยังไม่เช็ค’);
const c=ok?’#34d399’:’#f87171’;
return e(‘span’,{style:{display:‘inline-flex’,alignItems:‘center’,gap:5,padding:‘2px 9px’,borderRadius:20,fontSize:11,fontWeight:600,background:ok?’#0a2018’:’#220a0a’,color:c,border:`1px solid ${ok?'#14402e':'#401414'}`}},
e(‘span’,{style:{width:6,height:6,borderRadius:‘50%’,background:c,display:‘inline-block’,animation:ok?‘pulse 2s infinite’:‘none’}}),
ok?`Online${ms?` · ${ms}ms`:'`}`:‘Offline’
);
}

/* ══════════════════════════════════════════════════════════
MAIN APP
══════════════════════════════════════════════════════════ */
function App(){
const[tab,setTab]=useState(‘explore’);
const[mode,setMode]=useState(‘mock’);
const[wToken,setWToken]=useState(’’);
const[botKey,setBotKey]=useState(’’);

/* explore */
const[cat,setCat]=useState(null);
const[series,setSeries]=useState([]);
const[serLoad,setSerLoad]=useState(false);
const[q,setQ]=useState(’’);
const[catalog,setCatalog]=useState({});
const[catLoad,setCatLoad]=useState(false);

/* observe */
const[sel,setSel]=useState(null);
const[obs,setObs]=useState(null);
const[obsLoad,setObsLoad]=useState(false);
const[startP,setStartP]=useState(‘2023-01-01’);
const[endP,setEndP]=useState(’’);

/* saved */
const[saved,setSaved]=useState(()=>{try{return JSON.parse(localStorage.getItem(‘bot_saved’)||’[]’)}catch{return[]}});
const isSv=code=>saved.some(s=>s.code===code);
const addSv=s=>{if(isSv(s.code))return;const n=[…saved,s];setSaved(n);try{localStorage.setItem(‘bot_saved’,JSON.stringify(n))}catch{}};
const delSv=code=>{const n=saved.filter(s=>s.code!==code);setSaved(n);try{localStorage.setItem(‘bot_saved’,JSON.stringify(n))}catch{}};

/* status */
const[botSt,setBotSt]=useState({ok:null,ms:null});
const[stLoad,setStLoad]=useState(false);

/* ── API CALLS ── */
async function apiSeries(catId){
await new Promise(r=>setTimeout(r,350));
if(mode===‘mock’)return MOCK_S[catId]||[];
const auth=mode===‘worker’?`Bearer ${wToken}`:’’;
const url=mode===‘worker’?`${WORKER}/bot/series?category=${catId}`:`https://apiportal.bot.or.th/bot/public/series?category=${catId}`;
const headers=mode===‘worker’?{Authorization:auth}:{‘X-IBM-Client-Id’:botKey};
const r=await fetch(url,{headers});
if(!r.ok)throw new Error(`${r.status}`);
const d=await r.json();
return d?.result?.series||[];
}
async function apiObs(code){
await new Promise(r=>setTimeout(r,350));
if(mode===‘mock’)return mockObs(code);
const auth=mode===‘worker’?`Bearer ${wToken}`:’’;
let url=mode===‘worker’
?`${WORKER}/bot/observations?series_code=${code}&start_period=${startP}`
:`https://apiportal.bot.or.th/bot/public/observations?series_code=${code}&start_period=${startP}`;
if(endP)url+=`&end_period=${endP}`;
const headers=mode===‘worker’?{Authorization:auth}:{‘X-IBM-Client-Id’:botKey};
const r=await fetch(url,{headers});
if(!r.ok)throw new Error(`${r.status}`);
const d=await r.json();
return d?.result?.series?.[0]?.observations||[];
}
async function apiStatus(){
const t=Date.now();
if(mode===‘mock’){await new Promise(r=>setTimeout(r,220));setBotSt({ok:true,ms:180});return;}
try{
const r=await fetch(`${WORKER}/bot/status`,{headers:{Authorization:`Bearer ${wToken}`},signal:AbortSignal.timeout(8000)});
const ms=Date.now()-t;
const d=await r.json().catch(()=>({}));
setBotSt({ok:d.ok??r.ok,ms:d.latency_ms??ms});
}catch{setBotSt({ok:false,ms:Date.now()-t});}
}

async function loadCat(c){
setCat(c);setSeries([]);setQ(’’);setSerLoad(true);
try{const l=await apiSeries(c.id);setSeries(l);setCatalog(p=>({…p,[c.id]:l}));}
catch(err){alert(’โหลดไม่สำเร็จ: ’+err.message);}
setSerLoad(false);
}
async function loadObs(s){
setSel(s);setObs(null);setObsLoad(true);setTab(‘obs’);
try{const o=await apiObs(s.code);setObs({s,data:o});}
catch(err){alert(’ดึงไม่สำเร็จ: ’+err.message);}
setObsLoad(false);
}

const filt=series.filter(s=>!q||(s.series_code||’’).toLowerCase().includes(q.toLowerCase())||(s.series_name_th||’’).includes(q)||(s.series_name_eng||’’).toLowerCase().includes(q.toLowerCase()));
const totalCat=Object.values(catalog).reduce((a,b)=>a+b.length,0);

/* ════════════════════ TAB: EXPLORE ════════════════════ */
function TabExplore(){
return e(‘div’,{style:{display:‘flex’,height:‘calc(100vh - 48px)’}},
/* sidebar */
e(‘aside’,{style:{width:195,background:’#09090f’,borderRight:‘1px solid #161826’,overflowY:‘auto’,flexShrink:0,padding:‘10px 0’}},
e(‘div’,{style:{padding:‘4px 13px 7px’,fontSize:9,color:’#1e2235’,letterSpacing:2,textTransform:‘uppercase’}},‘หมวดหมู่ (10)’),
CATS.map(c=>{
const active=cat?.id===c.id;
return e(‘button’,{key:c.id,onClick:()=>loadCat(c),style:{display:‘block’,width:‘100%’,textAlign:‘left’,padding:‘9px 13px’,border:‘none’,borderLeft:`2px solid ${active?'#3b82f6':'transparent'}`,background:active?’#111428’:‘transparent’,color:active?’#93c5fd’:’#444’,fontFamily:‘inherit’}},
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’}},
e(‘span’,{style:{fontWeight:700,fontSize:11}},c.id),
catalog[c.id]&&e(‘span’,{style:{fontSize:9,color:’#2a3050’}},catalog[c.id].length)
),
e(‘div’,{style:{fontSize:9,color:active?’#4a6080’:’#2a2d42’,marginTop:2}},c.th)
);
}),
saved.length>0&&e(‘div’,null,
e(‘div’,{style:{padding:‘10px 13px 4px’,fontSize:9,color:’#1e2235’,letterSpacing:2,textTransform:‘uppercase’}},‘Saved’),
saved.map(s=>e(‘div’,{key:s.code,style:{padding:‘4px 13px’,fontSize:10,color:’#34d399’,cursor:‘pointer’,display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’}},
e(‘span’,{onClick:()=>loadObs(s)},`→ ${s.code}`),
e(‘span’,{onClick:()=>delSv(s.code),style:{color:’#401414’,fontSize:10}},‘✕’)
))
)
),
/* main */
e(‘main’,{style:{flex:1,overflowY:‘auto’,padding:16}},
!cat
? e(‘div’,null,
e(Card,null,
e(‘div’,{style:{fontSize:15,fontWeight:700,color:’#93c5fd’,marginBottom:8}},‘🏦 BOT API Explorer’),
e(‘div’,{style:{color:’#3a4060’,lineHeight:1.9,marginBottom:16}},
‘สำรวจข้อมูลสถิติ ธนาคารแห่งประเทศไทย (BOT)’,e(‘br’),
‘มีกว่า 500 series ครอบคลุม เศรษฐกิจ การเงิน ดอกเบี้ย อัตราแลกเปลี่ยน’
),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘1fr 1fr 1fr’,gap:10}},
[{l:‘หมวดหมู่’,v:CATS.length,bg:’#0a1028’},{l:‘Series ใน Catalog’,v:totalCat,bg:’#0a1a10’},{l:‘Saved’,v:saved.length,bg:’#1a1000’}]
.map(s=>e(‘div’,{key:s.l,style:{background:s.bg,border:‘1px solid #161826’,borderRadius:6,padding:14,textAlign:‘center’}},
e(‘div’,{style:{fontSize:28,fontWeight:700,color:’#c8d0e8’,marginBottom:4}},s.v),
e(‘div’,{style:{fontSize:10,color:’#3a4060’}},s.l)
))
)
),
saved.length>0&&e(Card,null,
e(‘div’,{style:{fontSize:12,fontWeight:700,color:’#93c5fd’,marginBottom:10}},‘⭐ Saved Series’),
saved.map(s=>e(‘div’,{key:s.code,style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,padding:‘7px 0’,borderBottom:‘1px solid #0f1020’}},
e(‘div’,null,
e(‘span’,{style:{color:’#60a5fa’,fontWeight:700,fontSize:12}},s.code),
e(‘span’,{style:{color:’#3a4060’,fontSize:11,marginLeft:8}},s.en||’’)
),
e(‘div’,{style:{display:‘flex’,gap:5}},
e(Btn,{v:‘pri’,sm:true,onClick:()=>loadObs(s)},‘ดูข้อมูล →’),
e(Btn,{v:‘red’,sm:true,onClick:()=>delSv(s.code)},‘✕’)
)
))
)
)
: e(‘div’,null,
e(‘div’,{style:{marginBottom:12}},
e(‘div’,{style:{fontSize:14,fontWeight:700,color:’#93c5fd’}},`${cat.id} — ${cat.th}`),
e(‘div’,{style:{fontSize:11,color:’#3a4060’,marginTop:2}},`${cat.en} · ${series.length} series`)
),
e(‘div’,{style:{marginBottom:10}},
e(Inp,{value:q,onChange:ev=>setQ(ev.target.value),placeholder:‘🔍 ค้นหา code / ชื่อไทย / English’,full:true})
),
serLoad
? e(‘div’,{style:{color:’#3a4060’,textAlign:‘center’,padding:40}},‘⏳ กำลังโหลด…’)
: filt.length===0
? e(‘div’,{style:{color:’#3a4060’,textAlign:‘center’,padding:30}},‘ไม่พบ series’)
: filt.map(s=>{
const code=s.series_code,sv=isSv(code);
const freq=s.frequency||’’;
return e(Card,{key:code,style:{borderColor:sv?’#1a3050’:’#161826’}},
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-start’,gap:8}},
e(‘div’,{style:{flex:1}},
e(‘div’,{style:{display:‘flex’,alignItems:‘center’,gap:6,flexWrap:‘wrap’,marginBottom:5}},
e(‘span’,{style:{color:’#60a5fa’,fontWeight:700,fontSize:12}},code),
freq===‘Daily’?e(Tag,{c:‘blue’},‘Daily’):freq===‘Monthly’?e(Tag,{c:‘green’},‘Monthly’):e(Tag,{c:‘orange’},freq||’-’),
sv&&e(Tag,{c:‘green’},‘⭐’)
),
e(‘div’,{style:{color:’#a0a8c0’,fontSize:11}},s.series_name_eng),
e(‘div’,{style:{color:’#3a4060’,fontSize:10,marginTop:2}},`${s.series_name_th||''} · ${s.unit_eng||'-'}`),
e(‘div’,{style:{color:’#1e2235’,fontSize:9,marginTop:3}},`อัปเดต: ${s.last_update_date||'-'}`)
),
e(‘div’,{style:{display:‘flex’,gap:5,flexShrink:0}},
e(Btn,{v:sv?‘ok’:‘def’,sm:true,onClick:()=>sv?delSv(code):addSv({code,en:s.series_name_eng,th:s.series_name_th,unit:s.unit_eng,freq:s.frequency,cat:cat.id})},sv?‘⭐’:‘☆’),
e(Btn,{v:‘pri’,sm:true,onClick:()=>loadObs({code,en:s.series_name_eng,th:s.series_name_th,unit:s.unit_eng})},‘ดึงข้อมูล →’)
)
)
);
})
)
)
);
}

/* ════════════════════ TAB: OBSERVATIONS ════════════════════ */
function TabObs(){
return e(‘div’,{style:{padding:16,overflowY:‘auto’,height:‘calc(100vh - 48px)’}},
e(Card,null,
e(‘div’,{style:{fontSize:13,fontWeight:700,color:’#93c5fd’,marginBottom:12}},‘🔍 ดึงข้อมูล Observations’),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘1fr 160px 160px’,gap:8,marginBottom:12}},
e(‘div’,null,
e(‘div’,{style:{fontSize:9,color:’#3a4060’,marginBottom:3,letterSpacing:1,textTransform:‘uppercase’}},‘Series Code’),
e(Inp,{value:sel?.code||’’,onChange:ev=>setSel({code:ev.target.value}),placeholder:‘เช่น BORCPI01’,full:true})
),
e(‘div’,null,
e(‘div’,{style:{fontSize:9,color:’#3a4060’,marginBottom:3,letterSpacing:1,textTransform:‘uppercase’}},‘Start’),
e(Inp,{type:‘date’,value:startP,onChange:ev=>setStartP(ev.target.value)})

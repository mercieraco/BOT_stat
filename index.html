{id:‘FI’, th:‘สถาบันการเงิน’,en:‘Financial Institutions’},

{id:‘BOP’,th:‘ดุลการชำระเงิน’,en:‘Balance of Payments’},

const MOCK_SERIES={

{series_code:‘BORCPI01’,series_name_th:‘ดัชนีราคาผู้บริโภค CPI’,series_name_eng:‘Consumer Price Index’,unit_eng:’%’,frequency:‘Monthly’,last_update_date:‘2026-04-30’},
{series_code:‘BORGDP01’,series_name_th:‘GDP Growth Rate’,series_name_eng:‘GDP Growth Rate’,unit_eng:’%’,frequency:‘Quarterly’,last_update_date:‘2026-03-31’},
{series_code:‘BORPMI01’,series_name_th:‘ดัชนี PMI ภาคการผลิต’,series_name_eng:‘Manufacturing PMI’,unit_eng:‘Index’,frequency:‘Monthly’,last_update_date:‘2026-04-30’},
{series_code:‘EIRPPIM00080’,series_name_th:‘ดัชนีราคาที่ดินเปล่า กรุงเทพฯ’,series_name_eng:‘Land Price Index Bangkok’,unit_eng:‘Index’,frequency:‘Monthly’,last_update_date:‘2026-03-31’},
{series_code:‘BORTRD01’,series_name_th:‘มูลค่าการส่งออก’,series_name_eng:‘Export Value’,unit_eng:‘Million USD’,frequency:‘Monthly’,last_update_date:‘2026-03-31’},
],
IR:[
{series_code:‘IR_1103500_06’,series_name_th:‘อัตราดอกเบี้ยนโยบาย’,series_name_eng:‘Policy Rate’,unit_eng:’%’,frequency:‘Monthly’,last_update_date:‘2026-04-30’},
{series_code:‘IR_1103500_13’,series_name_th:‘อัตราดอกเบี้ย MLR’,series_name_eng:‘MLR Rate’,unit_eng:’%’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
{series_code:‘IR_1103500_14’,series_name_th:‘อัตราดอกเบี้ย MRR’,series_name_eng:‘MRR Rate’,unit_eng:’%’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
],
ER:[
{series_code:‘EREF01’,series_name_th:‘USD/THB ถัวเฉลี่ยระหว่างธนาคาร’,series_name_eng:‘USD/THB Interbank Rate’,unit_eng:‘THB/USD’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
{series_code:‘EREF02’,series_name_th:‘EUR/THB อัตราแลกเปลี่ยน’,series_name_eng:‘EUR/THB Rate’,unit_eng:‘THB/EUR’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
{series_code:‘EREF03’,series_name_th:‘JPY/THB อัตราแลกเปลี่ยน’,series_name_eng:‘JPY/THB Rate’,unit_eng:‘THB/JPY’,frequency:‘Daily’,last_update_date:‘2026-05-09’},
],
FM:[
{series_code:‘PF00000000Q00232’,series_name_th:‘FSIs ยอดรวมตราสารหนี้’,series_name_eng:‘Government Debt Securities Total’,unit_eng:‘M.Baht’,frequency:‘Quarterly’,last_update_date:‘2026-03-31’},
],
};
for(const c of CATS) if(!MOCK_SERIES[c.id]) MOCK_SERIES[c.id]=[];

const mkObs=(code,n=12)=>{
const base={BORCPI01:[1.12,0.78,0.55,0.35,0.65,0.72,0.89,0.91,1.05,0.98,0.77,0.60],IR_1103500_06:[2.50,2.50,2.50,2.50,2.25,2.25,2.25,2.25,2.00,2.00,2.00,2.00]};
const vals=base[code]||Array.from({length:n},()=>+(Math.random()*3+0.5).toFixed(2));
return vals.map((v,i)=>{
const d=new Date(2026,3-i,1);
return{period_start:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,value:String(v)};
});
};

// ── STORAGE ──────────────────────────────────────────────────
function useSaved(){
const[saved,setSaved]=useState(()=>{try{return JSON.parse(localStorage.getItem(‘bot_saved’)||’[]’)}catch{return[]}});
const save=useCallback(s=>{
setSaved(prev=>{if(prev.find(x=>x.series_code===s.series_code))return prev;const n=[…prev,s];localStorage.setItem(‘bot_saved’,JSON.stringify(n));return n;});},[]);
const remove=useCallback(code=>{setSaved(prev=>{const n=prev.filter(x=>x.series_code!==code);localStorage.setItem(‘bot_saved’,JSON.stringify(n));return n;});},[]);
const isSaved=useCallback(code=>saved.some(s=>s.series_code===code),[saved]);
return{saved,save,remove,isSaved};
}

function useCatalog(){
const[catalog,setCatalog]=useState(()=>{try{return JSON.parse(localStorage.getItem(‘bot_catalog’)||’{}’)}catch{return{}}});
const addCat=useCallback((id,list)=>{setCatalog(prev=>{const n={…prev,[id]:list};localStorage.setItem(‘bot_catalog’,JSON.stringify(n));return n;});},[]);
return{catalog,addCat};
}

// ── API ───────────────────────────────────────────────────────
async function apiFetch(mode,apiKey,workerToken,path,params={}){
await new Promise(r=>setTimeout(r,350));
if(mode===‘mock’){
if(path===’/series’){const l=MOCK_SERIES[params.category]||[];return{result:{series:l}};}
if(path===’/observations’){return{result:{series:[{series_code:params.series_code,observations:mkObs(params.series_code)}]}};}
if(path===’/status’)return{ok:true,latency_ms:212,checked_at:new Date().toISOString()};
return{};
}
if(mode===‘worker’){
const q=new URLSearchParams(params);
const r=await fetch(`${WORKER_BASE}/bot${path}?${q}`,{headers:{Authorization:`Bearer ${workerToken}`}});
if(!r.ok)throw new Error(`Worker ${r.status}: ${await r.text()}`);
return r.json();
}
// direct
const q=new URLSearchParams(params);
const r=await fetch(`${BOT_OLD_BASE}${path}?${q}`,{headers:{‘X-IBM-Client-Id’:apiKey}});
if(!r.ok)throw new Error(`BOT API ${r.status}`);
return r.json();
}

// ── CHART ─────────────────────────────────────────────────────
function Chart({obs}){
if(!obs||obs.length<2)return null;
const vals=obs.map(o=>parseFloat(o.value)).filter(v=>!isNaN(v));
if(vals.length<2)return null;
const mn=Math.min(…vals),mx=Math.max(…vals),rng=mx-mn||0.01;
const W=300,H=60,pad=4;
const slice=vals.slice(-20);
const pts=slice.map((v,i)=>[
pad+(i/(slice.length-1))*(W-pad*2),
H-pad-((v-mn)/rng)*(H-pad*2)
]);
const up=vals[vals.length-1]>=vals[vals.length-2];
const col=up?’#3ddc84’:’#f06060’;
const pStr=pts.map(p=>p.join(’,’)).join(’ ‘);
const aStr=`${pts[0][0]},${H} ${pStr} ${pts[pts.length-1][0]},${H}`;
return h(‘div’,{style:{marginTop:12}},
h(‘svg’,{width:W,height:H,style:{display:‘block’,overflow:‘visible’}},
h(‘defs’,null,
h(‘linearGradient’,{id:‘cg’,x1:‘0’,y1:‘0’,x2:‘0’,y2:‘1’},
h(‘stop’,{offset:‘0%’,stopColor:col,stopOpacity:‘0.3’}),
h(‘stop’,{offset:‘100%’,stopColor:col,stopOpacity:‘0’})
)
),
h(‘polygon’,{points:aStr,fill:‘url(#cg)’}),
h(‘polyline’,{points:pStr,fill:‘none’,stroke:col,strokeWidth:‘1.8’,strokeLinejoin:‘round’,strokeLinecap:‘round’})
),
h(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,fontSize:10,color:’#444’,marginTop:3}},
h(‘span’,null,obs[Math.max(0,obs.length-20)]?.period_start||’’),
h(‘span’,{style:{color:col,fontWeight:700}},vals[vals.length-1]),
h(‘span’,null,obs[obs.length-1]?.period_start||’’)
)
);
}

// ── STATUS BADGE ─────────────────────────────────────────────
function SBadge({ok,lat}){
if(ok===null)return h(‘span’,{style:{color:’#333’,fontSize:11}},‘ยังไม่เช็ค’);

h(‘span’,{style:{width:6,height:6,borderRadius:‘50%’,background:c,display:‘inline-block’,animation:ok?‘pulse-dot 2s infinite’:‘none’}}),
ok?`Online${lat?` · ${lat}ms`:'`}`:‘Offline’

function Tag({children,col=’#1a1d2e’}){

// ── BTN ───────────────────────────────────────────────────────
const BTN_STYLES={
default:{background:’#141626’,color:’#888’,border:‘1px solid #1e2235’},
primary:{background:’#0d5fbd’,color:’#fff’,border:‘1px solid #1570e0’},
success:{background:’#0a2518’,color:’#3ddc84’,border:‘1px solid #163d25’},
danger: {background:’#250a0a’,color:’#f06060’,border:‘1px solid #3d1616’},
};
function Btn({children,variant=‘default’,onClick,disabled,style={}}){
const s=BTN_STYLES[variant]||BTN_STYLES.default;
return h(‘button’,{
onClick,disabled,
style:{…s,padding:‘6px 13px’,borderRadius:6,fontSize:12,fontWeight:600,fontFamily:‘inherit’,cursor:disabled?‘not-allowed’:‘pointer’,opacity:disabled?0.5:1,transition:‘opacity 0.1s’,…style}
},children);
}

// ── INPUT ─────────────────────────────────────────────────────
function Input({value,onChange,placeholder,type=‘text’,style={}}){

background:’#090a12’,border:‘1px solid #1e2235’,borderRadius:6,
color:’#dde4f0’,fontFamily:‘inherit’,fontSize:12,padding:‘7px 11px’,
outline:‘none’,width:‘100%’,…style
}});
}

function Card({children,style={}}){
return h(‘div’,{style:{background:’#0c0e1a’,border:‘1px solid #171928’,borderRadius:8,padding:16,marginBottom:12,…style}},children);
}

// ════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════
function App(){
const[tab,setTab]=useState(‘explore’);
const[mode,setMode]=useState(‘mock’); // mock|direct|worker
const[apiKey,setApiKey]=useState(’’);
const[workerToken,setWorkerToken]=useState(’’);

const{saved,save,remove,isSaved}=useSaved();
const{catalog,addCat}=useCatalog();

// explore
const[selCat,setSelCat]=useState(null);
const[series,setSeries]=useState([]);
const[serLoading,setSerLoading]=useState(false);
const[search,setSearch]=useState(’’);

// observe
const[selSeries,setSelSeries]=useState(null);
const[obs,setObs]=useState(null);
const[obsLoading,setObsLoading]=useState(false);
const[startP,setStartP]=useState(‘2023-01-01’);
const[endP,setEndP]=useState(’’);

// status
const[botSt,setBotSt]=useState({ok:null,lat:null,at:null});
const[stLoading,setStLoading]=useState(false);

// copy flash
const[flash,setFlash]=useState(’’);
const flashMsg=(k)=>{setFlash(k);setTimeout(()=>setFlash(’’),2000);};

// catalog load
const[catLoading,setCatLoading]=useState(false);

const call=useCallback((path,params)=>apiFetch(mode,apiKey,workerToken,path,params),[mode,apiKey,workerToken]);

const loadSeries=useCallback(async(cat)=>{
setSerLoading(true);setSeries([]);setSelSeries(null);setObs(null);
try{
const d=await call(’/series’,{category:cat.id});
const l=d?.result?.series||[];
setSeries(l);addCat(cat.id,l);
}catch(e){alert(’Error: ’+e.message);}
setSerLoading(false);
},[call,addCat]);

const loadObs=useCallback(async(s)=>{
setObsLoading(true);setObs(null);
const p={series_code:s.series_code,start_period:startP};
if(endP)p.end_period=endP;
try{
const d=await call(’/observations’,p);
const o=d?.result?.series?.[0]?.observations||[];
setObs({s,observations:o});
}catch(e){alert(’Error: ’+e.message);}
setObsLoading(false);
},[call,startP,endP]);

const checkStatus=useCallback(async()=>{
setStLoading(true);
try{const d=await call(’/status’,{});setBotSt({ok:d.ok??true,lat:d.latency_ms,at:d.checked_at});}
catch{setBotSt({ok:false,lat:null,at:new Date().toISOString()});}
setStLoading(false);
},[call]);

const goObs=(s)=>{setSelSeries(s);setTab(‘observe’);loadObs(s);};

const filtered=series.filter(s=>
!search||
s.series_code?.toLowerCase().includes(search.toLowerCase())||
(s.series_name_th||’’).includes(search)||
(s.series_name_eng||’’).toLowerCase().includes(search.toLowerCase())
);

const totalCat=Object.values(catalog).reduce((a,b)=>a+b.length,0);

// ── TABS UI ───────────────────────────────────────────────
const TABS=[
{k:‘explore’,label:‘🗂 Explore’},
{k:‘observe’,label:‘📊 Observations’},
{k:‘catalog’,label:‘📚 Catalog’},
{k:‘saved’,  label:`⭐ Saved (${saved.length})`},
{k:‘setup’,  label:‘⚙️ Setup’},
];

function renderExplore(){

// Sidebar
h(‘aside’,{style:{background:’#090a12’,borderRight:‘1px solid #171928’,overflowY:‘auto’,padding:‘12px 0’}},
h(‘div’,{style:{padding:‘4px 14px 8px’,fontSize:10,color:’#333’,letterSpacing:‘2px’,textTransform:‘uppercase’}},‘หมวดหมู่’),
CATS.map(c=>h(‘button’,{
key:c.id,
onClick:()=>{setSelCat(c);loadSeries(c);setSearch(’’);},

border:‘none’,background:selCat?.id===c.id?’#141e38’:‘transparent’,
color:selCat?.id===c.id?’#7ab4ff’:’#666’,cursor:‘pointer’,
borderLeft:`2px solid ${selCat?.id===c.id?'#1a6eff':'transparent'}`,
transition:‘all 0.1s’,
}
},
h(‘div’,{style:{fontWeight:600,fontSize:11}},c.id),
h(‘div’,{style:{fontSize:10,color:selCat?.id===c.id?’#5588cc’:’#444’,marginTop:2}},c.th)
)),
saved.length>0&&h(‘div’,null,
h(‘div’,{style:{padding:‘12px 14px 4px’,fontSize:10,color:’#333’,letterSpacing:‘2px’,textTransform:‘uppercase’}},‘Saved’),
h(‘div’,{style:{padding:‘4px 14px’,fontSize:11,color:’#3ddc84’}},`${saved.length} series`)
),
totalCat>0&&h(‘div’,null,
h(‘div’,{style:{padding:‘12px 14px 4px’,fontSize:10,color:’#333’,letterSpacing:‘2px’,textTransform:‘uppercase’}},‘Catalog’),
h(‘div’,{style:{padding:‘4px 14px’,fontSize:11,color:’#555’}},`${totalCat} series`)

!selCat
? h(‘div’,{className:‘fadein’},
Card2(‘🏦 BOT API Explorer — ธนาคารแห่งประเทศไทย’,
h(‘div’,{style:{color:’#555’,lineHeight:1.8,marginBottom:16}},
‘เลือกหมวดหมู่ทางซ้าย เพื่อสำรวจ series สถิติของ BOT’,h(‘br’),
‘มีข้อมูลกว่า 500+ series ครอบคลุม เศรษฐกิจ การเงิน ตลาดเงิน’
),
h(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘repeat(3,1fr)’,gap:10}},
[{l:‘หมวดหมู่’,v:CATS.length,c:’#0d1a38’},{l:‘Series ใน Catalog’,v:totalCat,c:’#0a1f12’},{l:‘Saved’,v:saved.length,c:’#1a1000’}]
.map(s=>h(‘div’,{key:s.l,style:{background:s.c,border:‘1px solid #171928’,borderRadius:6,padding:14,textAlign:‘center’}},
h(‘div’,{style:{fontSize:26,fontWeight:700,color:’#dde4f0’,marginBottom:4}},s.v),
h(‘div’,{style:{fontSize:11,color:’#555’}},s.l)

}

function Card2(title,content){

<script>
var WORKER  = 'https://iaa-ingest.9vk92zm5z2.workers.dev';
var stopDisc = false;
var foundSeries = [];
var savedSeries = [];
try { savedSeries = JSON.parse(localStorage.getItem('bot_saved_series')||'[]'); } catch{}
var curObs = null, curMeta = {};

function tok(){ return document.getElementById('tok').value.trim(); }
function setkw(v){ document.getElementById('kw').value=v; }

function log(msg, col){
  var el=document.getElementById('log');
  if(el.textContent==='รอ...') el.textContent='';
  el.innerHTML+='<span style="color:'+(col||'#4ade80')+'">'+msg+'</span>\n';
  el.scrollTop=el.scrollHeight;
}

// ── DISCOVER ─────────────────────────────────────────────────
async function runDiscover(){
  if(!tok()){alert('ใส่ INGEST_SECRET_TOKEN ก่อน');return;}
  var kw=document.getElementById('kw').value.trim();
  if(!kw){alert('ใส่ keyword ก่อน');return;}

  stopDisc=false;
  foundSeries=[];
  document.getElementById('disc-btn').disabled=true;
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('results-card').style.display='none';
  document.getElementById('results-list').innerHTML='';
  document.getElementById('disc-status').textContent='กำลังทำงาน...';

  log('เริ่ม Discovery: "'+kw+'"','#60a5fa');

  // Step 1: ดึง categories ทั้งหมด
  log('1. ดึง category list...','#fbbf24');
  var cats=[];
  try{
    var r=await fetch(WORKER+'/bot/categories',{headers:{Authorization:'Bearer '+tok()},signal:AbortSignal.timeout(12000)});
    var d=await r.json();
    cats=d?.result?.category??[];
    log('พบ '+cats.length+' categories','#4ade80');
  }catch(e){log('Error: '+e.message,'#f87171');done();return;}

  if(!cats.length){log('ไม่พบ categories','#f87171');done();return;}

  // Step 2: วน loop ทุก category
  log('2. วน loop '+cats.length+' categories...','#fbbf24');
  var keywords=kw.toLowerCase().split(',').map(function(k){return k.trim();}).filter(Boolean);

  for(var i=0;i<cats.length;i++){
    if(stopDisc){log('หยุดโดยผู้ใช้','#fbbf24');break;}

    var cat=cats[i];
    var catCode=cat.category;
    var pct=Math.round((i/cats.length)*100);
    document.getElementById('prog-bar').style.width=pct+'%';
    document.getElementById('prog-text').textContent='['+i+'/'+cats.length+'] '+catCode+' — พบแล้ว '+foundSeries.length+' series';

    try{
      var r2=await fetch(WORKER+'/bot/series?category='+catCode,{headers:{Authorization:'Bearer '+tok()},signal:AbortSignal.timeout(10000)});
      if(!r2.ok) continue;
      var d2=await r2.json();
      var seriesList=d2?.result?.series??[];

      for(var j=0;j<seriesList.length;j++){
        var s=seriesList[j];
        var txt=([s.series_code,s.series_name_eng,s.series_name_th].join(' ')).toLowerCase();
        var matched=keywords.filter(function(kw2){return txt.includes(kw2);});
        if(matched.length>0){
          foundSeries.push({
            series_code:       s.series_code,
            series_name_eng:   s.series_name_eng,
            series_name_th:    s.series_name_th,
            category:          catCode,
            category_eng:      cat.description_eng,
            observation_start: s.observation_start,
            observation_end:   s.observation_end,
            matched:           matched,
          });
        }
      }
    }catch(e){ continue; }

    // update results realtime ทุก 5 category
    if(i%5===0 && foundSeries.length>0) renderResults();
    if(foundSeries.length>=100) break; // พอแล้ว
  }

  log('Discovery เสร็จ: พบ '+foundSeries.length+' series จาก '+Math.min(i+1,cats.length)+' categories','#4ade80');
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('prog-text').textContent='เสร็จแล้ว — พบ '+foundSeries.length+' series';
  document.getElementById('disc-status').textContent='✅ พบ '+foundSeries.length+' series';
  renderResults();
  done();
}

function done(){
  document.getElementById('disc-btn').disabled=false;
}

function renderResults(){
  if(!foundSeries.length) return;
  var card=document.getElementById('results-card');
  card.style.display='block';
  document.getElementById('results-list').innerHTML=foundSeries.map(function(s,idx){
    var chips=s.matched.map(function(m){return '<span class="kw-chip">'+m+'</span>';}).join('');
    return '<div class="srow" onclick="getObs('+idx+')">'
      +'<span class="scode">'+s.series_code+'</span>'
      +'<span class="sinfo">'
        +'<div class="sen">'+s.series_name_eng+chips+'</div>'
        +'<div class="sth">'+s.series_name_th+'</div>'
        +'<div class="scat">📁 '+s.category+' — '+s.category_eng+'</div>'
      +'</span>'
      +'<span class="speriod">'+s.observation_start+'<br>→ '+s.observation_end+'</span>'
    +'</div>';
  }).join('');
}

// ── SAVE ────────────────────────────────────────────────────
function saveAll(){
  foundSeries.forEach(function(s){
    if(!savedSeries.find(function(x){return x.series_code===s.series_code;})){
      savedSeries.push(s);
    }
  });
  try{localStorage.setItem('bot_saved_series',JSON.stringify(savedSeries));}catch{}
  renderSaved();
}

function saveSingle(idx){
  var s=foundSeries[idx];
  if(!savedSeries.find(function(x){return x.series_code===s.series_code;})){
    savedSeries.push(s);
    try{localStorage.setItem('bot_saved_series',JSON.stringify(savedSeries));}catch{}
    renderSaved();
  }
}

function removeSaved(code){
  savedSeries=savedSeries.filter(function(s){return s.series_code!==code;});
  try{localStorage.setItem('bot_saved_series',JSON.stringify(savedSeries));}catch{}
  renderSaved();
}

function renderSaved(){
  var card=document.getElementById('saved-card');
  if(!savedSeries.length){card.style.display='none';return;}
  card.style.display='block';
  document.getElementById('saved-chips').innerHTML=savedSeries.map(function(s){
    return '<span class="saved-chip" onclick="getObsByCode(\''+s.series_code+'\',\''+esc(s.series_name_eng)+'\',\''+esc(s.series_name_th)+'\',\'\')">'+
      s.series_code+
      '<button onclick="event.stopPropagation();removeSaved(\''+s.series_code+'\')">✕</button>'+
    '</span>';
  }).join('');
}
renderSaved();

// ── OBSERVATIONS ────────────────────────────────────────────
async function getObs(idx){
  var s=foundSeries[idx];
  saveSingle(idx);
  renderSaved();
  getObsByCode(s.series_code, s.series_name_eng, s.series_name_th, s.series_name_th);
}

async function getObsByCode(code, en, th, unit){
  if(!tok()){alert('ใส่ token ก่อน');return;}
  curMeta={code,en,th};
  document.getElementById('obs-card').style.display='block';
  document.getElementById('obs-title').textContent=code;
  document.getElementById('obs-meta').textContent=(en||'')+(th?' | '+th:'');
  document.getElementById('obs-table').textContent='⏳ กำลังโหลด...';
  document.getElementById('obs-count').textContent='';
  log('ดึง observations: '+code,'#60a5fa');

  try{
    var r=await fetch(WORKER+'/bot/observations?series_code='+code+'&start_period=2020-01-01',{
      headers:{Authorization:'Bearer '+tok()},signal:AbortSignal.timeout(20000)
    });
    var d=await r.json();
    var series=d?.result?.series?.[0];
    var obs=series?.observations??[];
    log('series_code='+series?.series_code+' obs='+obs.length,'#4ade80');

    if(!obs.length){
      document.getElementById('obs-table').textContent='⚠️ ไม่มีข้อมูล\n\n'+JSON.stringify(d?._debug||{},null,2);
      return;
    }
    curObs=obs;
    var keys=Object.keys(obs[0]);
    log('keys: '+JSON.stringify(keys),'#fbbf24');
    var pKey=keys.find(function(k){return k.toLowerCase().includes('period')||k==='date';})||keys[0];
    var vKey=keys.find(function(k){return k.toLowerCase().includes('value')||k==='val';})||keys[1];
    document.getElementById('obs-count').textContent=obs.length+' จุดข้อมูล | '+pKey+' / '+vKey;
    document.getElementById('obs-table').textContent=obs.slice().reverse().map(function(o){
      return String(o[pKey]||'').padEnd(14)+' '+String(o[vKey]??'');
    }).join('\n');
    drawChart(obs,pKey,vKey);
    document.getElementById('obs-card').scrollIntoView({behavior:'smooth'});
  }catch(e){
    log('Error: '+e.message,'#f87171');
    document.getElementById('obs-table').textContent='Error: '+e.message;
  }
}

function drawChart(obs,pKey,vKey){
  var canvas=document.getElementById('spark');
  var ctx=canvas.getContext('2d');
  var vals=obs.map(function(o){return parseFloat(o[vKey]);}).filter(function(v){return !isNaN(v);});
  if(vals.length<2){ctx.clearRect(0,0,canvas.width,canvas.height);return;}
  var W=canvas.width,H=canvas.height,p=6;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||.01;
  var pts=vals.map(function(v,i){return[p+(i/(vals.length-1))*(W-p*2),H-p-((v-mn)/rng)*(H-p*2)];});
  var up=vals[vals.length-1]>=vals[vals.length-2];
  var col=up?'#16a34a':'#dc2626';
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();ctx.moveTo(pts[0][0],H);
  pts.forEach(function(pt){ctx.lineTo(pt[0],pt[1]);});
  ctx.lineTo(pts[pts.length-1][0],H);ctx.closePath();
  var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,col+'44');g.addColorStop(1,col+'05');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(function(pt){ctx.lineTo(pt[0],pt[1]);});
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  ctx.beginPath();ctx.arc(pts[pts.length-1][0],pts[pts.length-1][1],4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  var first=obs[0],last=obs[obs.length-1];
  document.getElementById('spark-lbl').innerHTML=
    '<span>'+(first[pKey]||'')+'</span>'+
    '<span style="color:'+col+';font-weight:700">'+vals[vals.length-1]+'</span>'+
    '<span>'+(last[pKey]||'')+'</span>';
}

function dlCSV(){
  if(!curObs||!curObs.length)return;
  var keys=Object.keys(curObs[0]);
  var rows=[keys.join(',')].concat(curObs.map(function(o){return keys.map(function(k){return o[k]??'';}).join(',');})).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows],{type:'text/csv'}));a.download=(curMeta.code||'data')+'.csv';a.click();
}

function exportJSON(){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(foundSeries,null,2)],{type:'application/json'}));
  a.download='bot_series_found.json';a.click();
}

function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

log('พร้อมใช้งาน','#60a5fa');
log('1. ใส่ INGEST_SECRET_TOKEN','#fbbf24');
log('2. เลือก preset หรือกรอก keyword','#fbbf24');
log('3. กด "เริ่ม Discovery" — รอ 1-3 นาที','#fbbf24');
log('4. คลิก series ที่สนใจ → เห็นข้อมูลจริง','#fbbf24');
</script>
